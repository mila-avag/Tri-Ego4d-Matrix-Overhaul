<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Permutation Tracker & Schedule</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{font-family:'Inter',sans-serif;background:#f7fafc}
  body{color:#2d3748}
  .container{max-width:1280px;margin:2rem auto;padding:0 1rem}
  h1{text-align:center;margin-bottom:1.5rem;font-weight:600}
  .tabs{display:flex;border-bottom:2px solid #e2e8f0}
  .tab{flex:1;text-align:center;padding:0.75rem;cursor:pointer;background:#edf2f7}
  .tab.active{background:#fff;border:2px solid #e2e8f0;border-bottom:none}
  .section{display:none;background:#fff;border:2px solid #e2e8f0;border-top:none;border-radius:0 0 8px 8px;padding:1rem}
  .section.active{display:block}
  #controls{display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:1rem}
  #controls button{background:#3182ce;color:#fff;border:none;padding:0.5rem 1rem;border-radius:6px;cursor:pointer}
  #controls button:hover{background:#2c5282}
  .form-row{display:flex;align-items:center;gap:1rem;margin:1rem 0}
  .form-row label{flex:0 0 200px;font-weight:500}
  .form-row input[type="number"],
  .form-row input[type="date"],
  .form-row select,
  .form-row button{flex:1;padding:0.5rem;border:1px solid #cbd5e0;border-radius:6px}
  #generateScheduleBtn{max-width:200px;background:#38a169;color:#fff;border:none}
  #generateScheduleBtn:hover{background:#2f855a}
  #saveScheduleBtn{max-width:200px;background:#d69e2e;color:#fff;border:none}
  #saveScheduleBtn:disabled{background:#e2e8f0;color:#a0aec0;cursor:not-allowed}
  #saveScheduleBtn:not(:disabled):hover{background:#b7791f}
  table{width:100%;border-collapse:collapse;margin-top:1rem}
  th,td{border:1px solid #e2e8f0;padding:0.75rem;text-align:center}
  th{background:#edf2f7;font-weight:600}
  .summary-cell{cursor:pointer}
  .summary-cell.done{background:#48bb78;color:#fff}
  #roomAvailability{display:flex;flex-wrap:wrap;gap:0.5rem}
  #roomAvailability label{display:flex;align-items:center;gap:0.25rem;padding:0.25rem 0.5rem;border:1px solid #cbd5e0;border-radius:6px;background:#edf2f7;cursor:pointer}
  #roomAvailability input{accent-color:#3182ce}
  @media(max-width:768px){
    .form-row{flex-direction:column;align-items:stretch}
    .form-row label{width:100%}
  }
</style>
</head>
<body>
<div class="container">
<h1>Permutation Tracker & Schedule</h1>

<div class="tabs">
  <div class="tab active" data-target="matrixSection">Matrix</div>
  <div class="tab" data-target="scheduleSection">Schedule</div>
</div>

<!-- MATRIX -->
<section id="matrixSection" class="section active">
  <div id="controls">
    <button id="addRoomBtn">+ Room</button><button id="removeRoomBtn">– Room</button>
    <button id="addWSBtn">+ WS</button><button id="removeWSBtn">– WS</button>
    <button id="addObjBtn">+ Object</button><button id="removeObjBtn">– Object</button>
    <button id="addVarBtn">+ Variation</button><button id="removeVarBtn">– Variation</button>
  </div>
  <div class="form-row"><label for="taskSelect">Select Task:</label><select id="taskSelect"></select></div>
  <table id="summaryMatrix"></table>
</section>

<!-- SCHEDULE -->
<section id="scheduleSection" class="section">
  <div class="form-row"><label>Task Entries:</label><div id="taskHoursList" style="flex:1"></div><button id="addTaskHourBtn">+ Entry</button></div>
  <div class="form-row"><label for="numPeople">Number of People:</label><input type="number" id="numPeople" min="1" value="1"/></div>
  <div class="form-row"><label>Available Rooms:</label><div id="roomAvailability"></div></div>
  <!-- <div class="form-row"><label for="scheduleDate">Schedule Date:</label><input type="date" id="scheduleDate"/><button id="saveScheduleBtn" disabled>Save</button></div> -->
  <div class="form-row"><button id="generateScheduleBtn">Generate Schedule</button></div>
  <div id="scheduleOutput"></div>
</section>
</div>

<script type="module">
/* FIREBASE */
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
import { getDatabase, ref, onValue, set, get } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";
initializeApp({
  apiKey:"AIzaSyDl2EkZ979ZB_xabqXoFFm1Kw_QQfniAkc",
  authDomain:"triton-ego4d-matrix.firebaseapp.com",
  databaseURL:"https://triton-ego4d-matrix-default-rtdb.firebaseio.com/",
  projectId:"triton-ego4d-matrix",
  storageBucket:"triton-ego4d-matrix.firebasestorage.app",
  messagingSenderId:"587475554830",
  appId:"1:587475554830:web:77c69aa312aea86c48e25f"});
const db=getDatabase();

/* CONSTANTS */
const tasks = [
  "Put Trash bags into trash bins",
  "Put Trash bags into trash bins mini-matrix",
  "Wipe table",
  "Close curtain",
  "Open cabinet",
  "Open drawer",
  "Open a drawer mini-matrix",
  "Setting a table with utensils and napkins",
  "Water plant",
  "Grating cheese or zesting citrus",
  "Polishing or buffing surfaces with a handheld polisher",
  "Applying caulking or sealant precisely",
  "Loading/unloading laundry from dryer/washer",
  "Turning a ratchet or wrench with torque control",
  "Operating a barcode scanner",
  "Pulling inventory bins from shelves",
  "Grabbing and aligning wooden planks",
  "Assembling cardboard boxes from flat",
  "Wipe whiteboard",
  "Unpack items from grocery bag and put them into fridge",
  "Toasting food with microwave oven",
  "Placing dishes into a dishwasher",
   'OTS: Closing & opening curtains',
  'OTS: Open a can of soda and pour into glass',
  'OTS: Picking up clothes and placing in hamper',
  'OTS: Plugging in devices for charge',
  'OTS: Making a bed',
  'OTS: Setting up a table',
  'OTS: Loading dishwasher',
  'OTS: Vacuuming floor + items (couch, etc)',
  'OTS: Cleaning up a messy room',
  'OTS: Making a smoothie',
  'OTS: Making a salad',
  'OTS: Organize groceries in the fridge',
  'OTS: Making coffee in espresso machine',
  'OTS: Changing bedsheets',
  'OTS: Putting away and folding laundry',
  'OTS: Cleaning & organizing the work desk',
  'OTS: Assemble a bed frame',
  'OTS: Packing for a picnic',
  'OTS: Making cookies',
  'OTS: Assembling a lamp',
  'OTS: Packing a suitcase for a weekend trip',
  "OTS: Wiping Table"
];

const defaultConfig = {
  rooms: ["Room 1","Room 2","Room 3","Room 4","Room 5","Room 6"],
  workstations: ["WS 1","WS 2"],
  objects: Array.from({length:12},(_,i)=>`Obj ${i+1}`),
  variations: ["default"]
};

const WS_COUNT = defaultConfig.workstations.length;
const tasksConfig = {};
const sanitize=s=>encodeURIComponent(s).replace(/\./g,'_').replace(/%20/g,'_');
const fmt=d=>d.toTimeString().slice(0,5);
const permRef=(t,v,r,w,o)=>ref(db,`permutations/${sanitize(t)}/${sanitize(v)}/${r}/${w}/${o}`);
const legacyPermRef=(t,r,w,o)=>ref(db,`permutations/${sanitize(t)}/${r}/${w}/${o}`);

/* TASK CONFIG SYNC */
const taskSelect=document.getElementById('taskSelect'),matrixEl=document.getElementById('summaryMatrix');
tasks.forEach(t=>onValue(ref(db,`tasksConfig/${sanitize(t)}`),snap=>{
  const v=snap.val()||{};
  tasksConfig[t]={rooms:v.rooms||[...defaultConfig.rooms],
                  workstations:v.workstations||[...defaultConfig.workstations],
                  objects:v.objects||[...defaultConfig.objects],
                  variations:v.variations||[...defaultConfig.variations]};
  if(taskSelect.value===t) renderMatrix(t);
  renderRoomAvailability();
}));
taskSelect.innerHTML=tasks.map(t=>`<option>${t}</option>`).join('');
taskSelect.onchange=()=>renderMatrix(taskSelect.value);

/* MATRIX VIEW */
function renderMatrix(task){
  const cfg=tasksConfig[task]||defaultConfig;
  matrixEl.innerHTML='';
  cfg.variations.forEach(variation=>{
    const wrap=document.createElement('div');wrap.style.marginBottom='1.5rem';
    wrap.innerHTML=`<h3>Variation: ${variation}</h3>`;
    const tbl=document.createElement('table'),thead=tbl.createTHead(),hr=thead.insertRow();
    hr.insertCell();cfg.objects.forEach(o=>hr.insertCell().textContent=o);
    const tb=tbl.createTBody();
    cfg.rooms.forEach(r=>cfg.workstations.forEach(w=>{
      const row=tb.insertRow();row.insertCell().outerHTML=`<th>${r} ${w}</th>`;
      cfg.objects.forEach(o=>{
        const td=row.insertCell();td.className='summary-cell';
        const newRef=permRef(task,variation,r,w,o),
              oldRef=variation==='default'?legacyPermRef(task,r,w,o):null;
        const setDone=snap=>td.classList.toggle('done',snap.exists()&&((snap.val()||{}).done??snap.val()));
        onValue(newRef,setDone);if(oldRef)onValue(oldRef,s=>s.exists()&&setDone(s));
        td.onclick=()=>set(newRef,{done:!td.classList.contains('done'),lastUpdated:(new Date).toISOString()});
      });
    }));
    wrap.appendChild(tbl);matrixEl.appendChild(wrap);
  });
}

/* ADD / REMOVE */
['Room','WS','Obj','Var'].forEach(t=>{
  document.getElementById(`add${t}Btn`).onclick=()=>{
    const name=prompt(`${t} name:`);if(!name)return;
    const cfg=tasksConfig[taskSelect.value],f={Room:'rooms',WS:'workstations',Obj:'objects',Var:'variations'}[t];
    cfg[f].push(name);set(ref(db,`tasksConfig/${sanitize(taskSelect.value)}/${f}`),cfg[f]);
  };
  document.getElementById(`remove${t}Btn`).onclick=()=>{
    const cfg=tasksConfig[taskSelect.value],f={Room:'rooms',WS:'workstations',Obj:'objects',Var:'variations'}[t];
    if(!cfg[f].length||!confirm(`Remove ${t} "${cfg[f].at(-1)}"?`))return;
    cfg[f].pop();set(ref(db,`tasksConfig/${sanitize(taskSelect.value)}/${f}`),cfg[f]);
  };
});

/* ROOM AVAIL */
const roomAvailWrap=document.getElementById('roomAvailability');
function renderRoomAvailability(){
  const all=[...new Set(defaultConfig.rooms.concat(...Object.values(tasksConfig).flatMap(c=>c.rooms||[])))];
  roomAvailWrap.innerHTML='';all.forEach(r=>{
    const id=`room_${r.replace(/\s+/g,'_')}`,lbl=document.createElement('label'),
          cb=document.createElement('input');cb.type='checkbox';cb.id=id;cb.value=r;cb.checked=true;
    lbl.append(cb,r);roomAvailWrap.appendChild(lbl);
  });
}renderRoomAvailability();

/* ENTRY BUILDER */
const taskHoursList=document.getElementById('taskHoursList');
document.getElementById('addTaskHourBtn').onclick=addEntry;addEntry();
function addEntry(){
  const row=document.createElement('div');row.className='taskHourEntry form-row';row.style.flexWrap='wrap';
  const sel=document.createElement('select');tasks.forEach(t=>{const o=document.createElement('option');o.value=t;o.textContent=t;sel.appendChild(o);});
  const est=document.createElement('input');est.type='number';est.min=0;est.placeholder='Minutes / variation';est.className='estMin';
  const hr=document.createElement('input');hr.type='number';hr.min=0;hr.placeholder='Hours goal';hr.className='hoursTarget';
  const objSel=document.createElement('select');objSel.multiple=true;objSel.size=6;objSel.className='objSel';
  const refresh=()=>{const cfg=tasksConfig[sel.value]||defaultConfig;objSel.innerHTML='';cfg.objects.forEach(o=>{const p=document.createElement('option');p.value=o;p.textContent=o;objSel.appendChild(p);});};
  sel.onchange=refresh;refresh();
  const rm=document.createElement('button');rm.type='button';rm.textContent='Remove';rm.onclick=()=>row.remove();
  row.append(sel,est,hr,objSel,rm);taskHoursList.appendChild(row);
}

/* SCHEDULER */
// const out=document.getElementById('scheduleOutput'),saveBtn=document.getElementById('saveScheduleBtn'),dateInput=document.getElementById('scheduleDate');
document.getElementById('generateScheduleBtn').onclick=async()=>{
  const slotMin=35,gapMin=5,rooms=[...roomAvailWrap.querySelectorAll('input:checked')].map(c=>c.value);
  if(!rooms.length)return alert('Select at least one room');
  const people=+document.getElementById('numPeople').value||1;if(people>rooms.length*WS_COUNT)return alert('Too many people');

  let pool=[];
  for(const row of document.querySelectorAll('.taskHourEntry')){
    const task=row.querySelector('select').value,estMin=+row.querySelector('.estMin').value||0,hours=+row.querySelector('.hoursTarget').value||0;
    if(estMin<=0||hours<=0)continue;
    const cfg=tasksConfig[task]||defaultConfig,varCount=cfg.variations.length,setMin=estMin*varCount,
          needSets=Math.ceil(hours*60/setMin),allow=new Set([...row.querySelector('.objSel').selectedOptions].map(o=>o.value));
    /* pull permutation maps for all variations up front */
    const varMaps={};for(const v of cfg.variations){varMaps[v]=(await get(ref(db,`permutations/${sanitize(task)}/${sanitize(v)}`))).val()||{};}
    const legacy=(await get(ref(db,`permutations/${sanitize(task)}`))).val()||{};
    const cand=[];
    cfg.rooms.forEach(r=>cfg.workstations.forEach(w=>cfg.objects.forEach(o=>{
      if(allow.size&& !allow.has(o))return;
      let used=false;
      for(const v of cfg.variations){
        if(varMaps[v][r]?.[w]?.[o]?.done||(v==='default'&&legacy[r]?.[w]?.[o]?.done)){used=true;break;}
      }
      if(!used)cand.push({task,r,w,o});
    })));
    if(cand.length<needSets)return alert(`Not enough free combos for "${task}"`);
    shuffle(cand);pool.push(...cand.slice(0,needSets));
  }
  if(!pool.length)return alert('Nothing to schedule');
  shuffle(pool);

  /* build slots */
  const events=[];let now=new Date(1970,0,1,9,30);
  while(pool.length){
    const slot={},usedObj=new Set(),usedCombo=new Set();let i=0;
    while(Object.keys(slot).length<people&&i<pool.length){
      const p=pool[i],combo=`${p.r}::${p.w}`;
      if(rooms.includes(p.r)&&!usedCombo.has(combo)&&!usedObj.has(p.o)){
        slot[combo]=p;usedCombo.add(combo);usedObj.add(p.o);pool.splice(i,1);
      }else i++;
    }
    if(Object.keys(slot).length<people){alert('Could not fill a full slot');break;}
    const end=new Date(now.getTime()+slotMin*60000),byRoom={};
    Object.values(slot).forEach(e=>(byRoom[e.r]??=[]).push(e));
    events.push({time:`${fmt(now)}–${fmt(end)}`,map:byRoom});
    now=new Date(end.getTime()+gapMin*60000);
  }

  /* render */
  out.innerHTML='';const tbl=document.createElement('table'),head=tbl.insertRow();
  rooms.forEach(r=>head.insertCell().outerHTML=`<th>${r}</th>`);
  events.forEach(ev=>{
    const tr=tbl.insertRow();
    rooms.forEach(r=>{
      const td=tr.insertCell();
      if(ev.map[r])td.innerHTML=ev.map[r].map(e=>`${e.w}: ${e.task} - ${e.o}`).join('<br>');
    });
  });
  out.appendChild(tbl);saveBtn.disabled=false;
};


/* HELPERS */
function shuffle(a){for(let i=a.length-1;i>0;--i){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}}
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));t.classList.add('active');document.getElementById(t.dataset.target).classList.add('active');});
renderMatrix(taskSelect.value);
</script>
</body>
</html>
